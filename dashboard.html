<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px;
}

.card {
    border: 1px solid #333;
    padding: 20px;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Deal Dashboard</h1>

    <div id="deals"></div>
</div>

<script>
const _supabase = supabase.createClient(
    "https://dzzoupgpaxxhxusptbdr.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6em91cGdwYXh4aHh1c3B0YmRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjEwMzIsImV4cCI6MjA5MjQzNzAzMn0.5rnHArkFwW4h-n3uCH_ZwYLXYvd-j2tATaWq-EGBDmo");

  async function loadDeals() {
    const container = document.getElementById("deals");
    
    try {
      const { data, error } = await _supabase.from('deals').select('*');

      if (error) {
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "<p>No active deals found.</p>";
        return;
      }

      // Success: Build the professional cards
      container.innerHTML = ""; 
      data.forEach(d => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h3 style="color: #fff; margin-bottom: 10px;">${d.name}</h3>
          <p style="color: #ccc;">${d.description}</p>
          <p style="font-size: 0.8rem; color: #888;">Allocation: ${d.type}</p>
        `;
        container.appendChild(div);
      });

    } catch (err) {
      console.error("Critical Load Error:", err);
    }
  }

  loadDeals();
</script>

</body>
</html>
