<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px;
}

.card {
    border: 1px solid #333;
    padding: 20px;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Deal Dashboard</h1>

    <div id="deals"></div>
</div>

<script>
const supabase = supabase.createClient(
"YOUR_URL",
"YOUR_PUBLIC_KEY"
);

async function loadDeals() {
    const { data } = await supabase
        .from('deals')
        .select('*');

    const container = document.getElementById("deals");

    data.forEach(d => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h3>${d.name}</h3>
            <p>${d.description}</p>
            <p>Allocation: ${d.type}</p>
        `;
        container.appendChild(div);
    });
}

loadDeals();
</script>

</body>
</html>
